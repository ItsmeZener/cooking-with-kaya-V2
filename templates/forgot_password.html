{% extends "base.html" %}

{% block title %}Forgot Password - Cooking with Kaya{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 bg-gradient-to-br from-orange-50 to-red-50">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-orange-500 to-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-orange-500/30">
                    <i class="fas fa-key text-2xl text-white"></i>
                </div>
                <h2 class="text-3xl font-bold text-gray-900">Forgot Password?</h2>
                <p class="text-gray-600 mt-2">Enter your username or email and we'll send you instructions to reset your password.</p>
            </div>
            
            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username or Email</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3 text-gray-400">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" name="username_or_email" required 
                            class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition"
                            placeholder="Enter your username or email">
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white py-3 rounded-xl font-bold transition hover:shadow-lg hover:shadow-orange-500/30 hover:-translate-y-0.5">
                    Send Reset Link
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600">Remember your password? 
                    <a href="{{ url_for('login') }}" class="text-orange-500 font-medium hover:text-orange-600 transition">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

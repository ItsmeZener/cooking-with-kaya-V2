services:
  - type: web
    name: cooking-with-kaya
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python upgrade_db.py && python init_db.py && python -m gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
    plan: free
    healthCheckPath: /health
